<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Inner Sanctum 🔒</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#b8860b;--gold-light:#d4a843;--gold-dim:rgba(184,134,11,0.2);--gold-faint:rgba(184,134,11,0.07);--cream:#fef9ef;--cream2:#fdf3dc;--cream3:#f5e9c8;--dark:#1a1a1a;--warm:#7a5c1e;--red:#c0392b}
html,body{height:100%;overflow:hidden}
body{background:var(--dark);font-family:'Jost',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;background-image:radial-gradient(circle,rgba(255,255,255,0.04) 1px,transparent 1px);background-size:24px 24px}
.scene{display:flex;align-items:flex-end;justify-content:center;gap:1.5rem;width:100%;max-width:820px;padding:1rem 1rem 0}
.guard-wrap{flex-shrink:0;display:flex;flex-direction:column;align-items:center;width:110px}
.guard-svg{width:110px;height:200px;transition:all 0.3s ease}
.guard-bubble{background:var(--dark);border:0.5px solid var(--gold-dim);padding:8px 12px;font-size:11px;font-style:italic;color:var(--gold-light);max-width:150px;text-align:center;line-height:1.5;margin-bottom:8px;position:relative;font-family:'Playfair Display',serif;min-height:48px;border-radius:2px;transition:all 0.3s}
.guard-bubble.angry{background:#2a0808;border-color:rgba(192,57,43,0.5);color:#ff6b6b}
.guard-bubble::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border:7px solid transparent;border-top-color:var(--gold-dim)}
.card{background:#242424;border:1px solid var(--gold-dim);width:100%;max-width:420px;padding:2rem 1.75rem;text-align:center;position:relative;flex:1}
.card::before{content:'';position:absolute;top:-5px;left:-5px;width:16px;height:16px;border-top:1.5px solid var(--gold);border-left:1.5px solid var(--gold)}
.card::after{content:'';position:absolute;bottom:-5px;right:-5px;width:16px;height:16px;border-bottom:1.5px solid var(--gold);border-right:1.5px solid var(--gold)}
.corner-tr{position:absolute;top:-5px;right:-5px;width:16px;height:16px;border-top:1.5px solid var(--gold);border-right:1.5px solid var(--gold)}
.corner-bl{position:absolute;bottom:-5px;left:-5px;width:16px;height:16px;border-bottom:1.5px solid var(--gold);border-left:1.5px solid var(--gold)}
.gate-label{font-size:10px;letter-spacing:0.45em;text-transform:uppercase;color:var(--gold);margin-bottom:0.5rem}
.gate-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-style:italic;color:#fff;margin-bottom:0.25rem;line-height:1.3}
.gate-sub{font-size:0.82rem;color:#888;margin-bottom:1.5rem;font-weight:300}
.q-text{font-family:'Playfair Display',serif;font-size:1rem;font-style:italic;color:#ddd;line-height:1.6;margin-bottom:1rem;min-height:52px;transition:opacity 0.3s}
.options{display:flex;flex-direction:column;gap:0.5rem}
.opt-btn{background:transparent;border:0.5px solid var(--gold-dim);padding:9px 14px;font-family:'Jost',sans-serif;font-size:0.85rem;color:#ccc;cursor:pointer;text-align:left;transition:background 0.2s,border-color 0.2s,color 0.2s,transform 0.2s;border-radius:2px}
.opt-btn:hover:not(:disabled){background:rgba(184,134,11,0.15);border-color:var(--gold);color:#fff}
.opt-btn.correct{background:#11331c;border-color:#22c55e;color:#4ade80;pointer-events:none}
.opt-btn.wrong{background:#331111;border-color:var(--red);color:#ff6b6b;animation:shake 0.4s ease;pointer-events:none}
.opt-btn.dimmed{opacity:0.3;pointer-events:none}
.progress-wrap{display:flex;justify-content:center;gap:6px;margin-bottom:1rem}
.prog-dot{width:6px;height:6px;border-radius:50%;background:#444;transition:background 0.3s}
.prog-dot.done{background:var(--gold)}
.tries-wrap{font-size:11px;color:#ff6b6b;min-height:18px;margin-bottom:0.5rem;font-style:italic;opacity:0;transition:opacity 0.3s}
.tries-wrap.show{opacity:1}
.reveal-overlay{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity 0.8s ease;flex-direction:column;gap:1rem;text-align:center;padding:2rem}
.reveal-overlay.show{opacity:1;pointer-events:all}
.reveal-skull{font-size:3rem;animation:bounce 0.8s ease infinite alternate}
.reveal-title{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,5vw,2.5rem);font-style:italic;color:#fff}
.reveal-sub{font-size:0.88rem;color:#aaa;font-weight:300}
.reveal-btn{margin-top:0.75rem;font-family:'Jost',sans-serif;font-size:10px;letter-spacing:0.4em;text-transform:uppercase;color:var(--dark);background:var(--gold);padding:12px 30px;border:none;cursor:pointer;transition:background 0.3s;border-radius:2px}
.reveal-btn:hover{background:#fff}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.35s ease both}
@media(max-width:600px){.scene{flex-direction:column;align-items:center;overflow-y:auto;height:100vh;padding-bottom:2rem}html,body{overflow:auto}.guard-wrap{flex-direction:row;gap:0.75rem;align-items:flex-end;width:100%;max-width:420px}.guard-svg{width:70px;height:130px}.guard-bubble{margin-bottom:0;flex:1;text-align:left}.guard-bubble::after{display:none}}
</style>
</head>
<body>
<div class="scene">
  <div class="guard-wrap">
    <div class="guard-bubble" id="guardBubble">Only those who know her deepest secrets may enter...</div>
    <svg class="guard-svg" id="guardSvg" viewBox="0 0 110 200" xmlns="http://www.w3.org/2000/svg">
      <!-- Guard body identical to gate.html but modified coloring for "dark mode" omitted for brevity, using same logic -->
      <g id="guardHat">
        <rect x="28" y="8" width="54" height="62" rx="4" fill="#000"/>
        <rect x="22" y="66" width="66" height="10" rx="2" fill="#111"/>
        <rect x="44" y="22" width="22" height="18" rx="2" fill="#d4a843"/>
        <text x="55" y="35" text-anchor="middle" font-size="10" fill="#1a1a1a" font-weight="bold">✦</text>
      </g>
      <rect x="32" y="70" width="46" height="42" rx="8" fill="#fde68a"/>
      <circle id="gCheekL" cx="38" cy="98" r="6" fill="#fca5a5" opacity="0"/>
      <circle id="gCheekR" cx="72" cy="98" r="6" fill="#fca5a5" opacity="0"/>
      <path id="gBrowL" d="M38,82 Q44,80 50,84" fill="none" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>
      <path id="gBrowR" d="M60,80 Q66,82 72,84" fill="none" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>
      <ellipse id="gEyeL" cx="44" cy="87" rx="4.5" ry="3" fill="#92400e"/>
      <ellipse id="gEyeR" cx="66" cy="87" rx="4.5" ry="3" fill="#92400e"/>
      <circle cx="45" cy="86" r="1.5" fill="#fff"/>
      <circle cx="67" cy="86" r="1.5" fill="#fff"/>
      <path id="gMouth" d="M46,106 Q55,103 64,106" fill="none" stroke="#92400e" stroke-width="2" stroke-linecap="round"/>
      <path id="gSweat" d="M78,82 Q81,78 78,74 Q75,78 78,82Z" fill="#93c5fd" opacity="0"/>
      <rect x="22" y="112" width="66" height="70" rx="4" fill="#000"/>
      <circle cx="55" cy="124" r="3" fill="#d4a843"/><circle cx="55" cy="136" r="3" fill="#d4a843"/>
      <circle cx="55" cy="148" r="3" fill="#d4a843"/><circle cx="55" cy="160" r="3" fill="#d4a843"/>
      <rect x="22" y="162" width="66" height="8" rx="1" fill="#444"/>
      <g id="guardArmL"><rect x="6" y="112" width="18" height="50" rx="6" fill="#000"/><rect x="6" y="152" width="18" height="14" rx="4" fill="#fde68a"/><rect x="10" y="50" width="4" height="120" rx="2" fill="#333"/></g>
      <g id="guardArmR"><rect x="86" y="112" width="18" height="50" rx="6" fill="#000"/><rect x="86" y="152" width="18" height="14" rx="4" fill="#fde68a"/></g>
      <rect x="30" y="178" width="20" height="22" rx="3" fill="#050505"/><rect x="60" y="178" width="20" height="22" rx="3" fill="#050505"/>
      <g id="gSalute" opacity="0"><rect x="82" y="82" width="16" height="10" rx="4" fill="#fde68a"/></g>
      <text id="gSparkle1" x="4" y="60" font-size="14" fill="#d4a843" opacity="0">✦</text>
      <text id="gSparkle2" x="90" y="48" font-size="10" fill="#d4a843" opacity="0">✦</text>
      <g id="gStop" opacity="0">
        <rect x="82" y="90" width="18" height="22" rx="4" fill="#fde68a"/>
        <line x1="91" y1="90" x2="91" y2="112" stroke="#92400e" stroke-width="1"/>
      </g>
    </svg>
  </div>

  <div class="card">
    <div class="corner-tr"></div><div class="corner-bl"></div>
    <div class="gate-label">❧ &nbsp; High Security &nbsp; ❧</div>
    <h1 class="gate-title" id="gateTitle">The Shadow Gate</h1>
    <p class="gate-sub">Prove you know her embarrassing truths...</p>
    <div class="progress-wrap" id="progressWrap"></div>
    <div class="tries-wrap" id="triesWrap"></div>
    <div class="q-text" id="qText"></div>
    <div class="options" id="options"></div>
  </div>
</div>

<div class="reveal-overlay" id="revealOverlay">
  <div class="reveal-skull">☠️</div>
  <div class="reveal-title">The Vault is Open...</div>
  <div class="reveal-sub">Prepare for chaos.</div>
  <button class="reveal-btn" onclick="window.location.href='secret.html'">Enter the Roast ❧</button>
</div>

<script>
const questions = [
  {
    q: "How long does it actually take her to get ready?",
    correct: 2,
    wrongReactions: [
      "Lies! Try again. 🛑",
      "She wishes. Answer honestly! 👀"
    ],
    opts: [
      { text: "15 minutes",       mood:"angry",   reaction:"Don't make me laugh. 🛑" },
      { text: "An hour",          mood:"angry",   reaction:"Still too generous. 🛑" },
      { text: "3 business days",  mood:"laugh",   reaction:"Correct! The realm knows this truth. ✦" }
    ]
  },
  {
    q: "What happens when she's hungry?",
    correct: 1,
    wrongReactions: [
      "Incorrect. The reality is much worse. 🛑",
      "You clearly don't know her. Retry! 😤"
    ],
    opts: [
      { text: "She makes a quiet snack", mood:"angry",   reaction:"Quiet? Never. 🛑" },
      { text: "She turns into a monster",mood:"suspicious", reaction:"Accurate. Frighteningly accurate. ✦" },
      { text: "She drinks water",        mood:"angry",   reaction:"Who are you kidding? 🛑" }
    ]
  }
];

const guardMoods = {
  laugh:     { bL:"M38,77 Q44,73 50,77", bR:"M60,77 Q66,73 72,77", mouth:"M38,101 Q55,116 72,101", eyeRy:"3",   cheek:1, sweat:0, sparkle:1, salute:0, stop:0 },
  suspicious:{ bL:"M38,82 Q44,80 50,84", bR:"M60,80 Q66,82 72,84", mouth:"M46,106 Q55,103 64,106", eyeRy:"3",   cheek:0, sweat:0, sparkle:0, salute:0, stop:0 },
  angry:     { bL:"M38,85 Q44,81 50,85", bR:"M60,85 Q66,81 72,85", mouth:"M44,108 Q55,104 66,108", eyeRy:"3",   cheek:0, sweat:0, sparkle:0, salute:0, stop:1 }
};

function setGuard(name,speech){
  const m=guardMoods[name]||guardMoods.suspicious;
  document.getElementById('gBrowL').setAttribute('d',m.bL);
  document.getElementById('gBrowR').setAttribute('d',m.bR);
  document.getElementById('gMouth').setAttribute('d',m.mouth);
  document.getElementById('gEyeL').setAttribute('ry',m.eyeRy);
  document.getElementById('gEyeR').setAttribute('ry',m.eyeRy);
  document.getElementById('gCheekL').style.opacity=m.cheek;
  document.getElementById('gCheekR').style.opacity=m.cheek;
  document.getElementById('gSweat').style.opacity=m.sweat;
  document.getElementById('gSparkle1').style.opacity=m.sparkle;
  document.getElementById('gSparkle2').style.opacity=m.sparkle;
  document.getElementById('gSalute').style.opacity=m.salute;
  document.getElementById('gStop').style.opacity=m.stop;
  const bubble=document.getElementById('guardBubble');
  if(speech){bubble.textContent=speech;bubble.className=name==='angry'?'guard-bubble angry':'guard-bubble'}
}

let current=0, wrongCount=0;

function buildProgress(){
  const wrap=document.getElementById('progressWrap');wrap.innerHTML='';
  questions.forEach((_,i)=>{const d=document.createElement('div');d.className='prog-dot'+(i<current?' done':'');wrap.appendChild(d)});
}

function renderQuestion(){
  const q=questions[current];wrongCount=0;
  document.getElementById('triesWrap').className='tries-wrap';
  const qEl=document.getElementById('qText');
  qEl.style.opacity=0;
  setTimeout(()=>{qEl.textContent=q.q;qEl.style.opacity=1},180);
  const opts=document.getElementById('options');opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const btn=document.createElement('button');
    btn.className='opt-btn fade-in';
    btn.style.animationDelay=(i*0.07)+'s';
    btn.textContent=o.text;
    btn.onclick=()=>pick(q,o,i,btn);
    opts.appendChild(btn);
  });
  buildProgress();
}

function pick(q,opt,idx,btn){
  const btns=document.querySelectorAll('.opt-btn');
  btns.forEach(b=>b.disabled=true);

  if(idx===q.correct){
    btn.classList.add('correct');
    setGuard(opt.mood,opt.reaction);
    document.getElementById('triesWrap').className='tries-wrap';
    setTimeout(()=>{
      current++;
      if(current>=questions.length) showReveal();
      else renderQuestion();
    },1100);
  } else {
    wrongCount++;
    btn.classList.add('wrong');
    const roasts=q.wrongReactions;
    const roast=roasts[(wrongCount-1)%roasts.length];
    setGuard('angry',roast);
    const tw=document.getElementById('triesWrap');
    tw.textContent=wrongCount===1?'❌ Guard denies your lies. Try again!':`❌ Still lying. Guard blocks you!`;
    tw.className='tries-wrap show';
    setTimeout(()=>{
      btns.forEach(b=>{
        b.disabled=false;
        if(b===btn){b.classList.remove('wrong');b.classList.add('dimmed')}
      });
      setGuard('suspicious','Tell the truth. I am watching. 👀');
    },1200);
  }
}

function showReveal(){
  setGuard('laugh','Access granted! Enjoy the roast! ✦');
  setTimeout(()=>document.getElementById('revealOverlay').classList.add('show'),500);
}

setGuard('suspicious','Only those who know her deepest secrets may enter...');
renderQuestion();
</script>
</body>
</html>
